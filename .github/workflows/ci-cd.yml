name: CI/CD Pipeline

# 触发条件：当代码推送到 main 分支时自动执行
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest # 在云端使用最新的 Linux 环境

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn httpx requests pydantic

    - name: Run Mock Server and Test Skill
      run: |
        # 1. 在云端后台悄悄启动我们的 Mock 服务器
        nohup uvicorn src.app:app --host 127.0.0.1 --port 8000 &
        
        # 2. 等待 3 秒钟确保服务器启动完毕
        sleep 3 
        
        # 3. 运行我们之前写好的 5 个核心测试用例
        python test_skill.py