name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Mock API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate OpenAPI YAML
        run: python -c "import yaml; yaml.safe_load(open('src/schemas/openapi.yaml'))"

      - name: MCP module import smoke test
        run: python -c "import recharge_mcp.server; print('MCP OK')"

      - name: Run Mock Server and Tests
        run: |
          uvicorn src.app:app --host 127.0.0.1 --port 8000 &
          sleep 3
          python test_skill.py

  lint-openapi:
    name: OpenAPI Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - name: Check required paths exist in OpenAPI
        run: |
          python - <<'PY'
          import yaml
          spec = yaml.safe_load(open("src/schemas/openapi.yaml"))
          required = [
              "/brands", "/orders/create",
              "/seller/orders/pending", "/seller/orders/{orderId}/deliver"
          ]
          paths = spec.get("paths", {})
          missing = [p for p in required if p not in paths]
          assert not missing, f"Missing paths: {missing}"
          print("OpenAPI paths OK")
          PY
